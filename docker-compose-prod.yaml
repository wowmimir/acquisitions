services:
  app:
    build:
      context: .
      target: production

    container_name: acquisitions-prod

    ports:
      - '${PORT:-3000}:3000'

    env_file:
      - .env.production

    restart: unless-stopped

    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => { process.exit(1) })",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - acquisitions-net-prod

networks:
  acquisitions-net-prod:
    driver: bridge
